<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Over</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 20px;
    }
    button {
      padding: 15px 30px;
      font-size: 1.2em;
      background: #ba732a;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>YOU GOT SHIT ON YOUR DICK NOOOOO </h1>
  <p class="subtext">(hey click anywhere on this page)</p>
<p>Final Score: <span id="final-score">0</span></p>
<button onclick="location.href='selection.html'">Try Again?</button>

<audio id="moyai-sound" src="moyai.mp3" preload="auto"></audio>

<script>
  const score = sessionStorage.getItem('lastScore') || 0;
  document.getElementById('final-score').textContent = score;

  window.addEventListener('load', () => {
    const moyai = document.getElementById('moyai-sound');
    moyai.volume = 0.7;

    moyai.play().catch(() => {
      console.warn("Autoplay blocked. Waiting for user interaction...");
      const tryPlay = () => {
        moyai.play();
        document.removeEventListener("click", tryPlay);
      };
      document.addEventListener("click", tryPlay);
    });
  });
</script>

  </script>
</body>
</html>
